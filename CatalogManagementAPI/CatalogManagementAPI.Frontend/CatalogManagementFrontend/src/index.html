<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Catalog Management</title>
  <base href="/">
  <meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <link rel="preload" as="font" href="assets/iconfont/MaterialIcons-Regular.woff2" type="font/woff2" crossorigin="anonymous" />
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <style type="text/css">
    body,
    html {
        height: 100%;
    }

    body {
        margin: 0;
    }

    .app-loading {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
    }

        .app-loading .spinner {
            height: 200px;
            width: 200px;
            animation: rotate 2s linear infinite;
            transform-origin: center center;
            position: absolute;
            margin: 0;
        }

    .logo-image {
        position: absolute;
    }

    .app-loading .spinner .path {
        stroke-dasharray: 1, 200;
        stroke-dashoffset: 0;
        animation: dash 1.5s ease-in-out infinite;
        stroke-linecap: round;
        stroke: #0033a1;
    }

    @keyframes rotate {
        100% {
            transform: rotate(360deg);
        }
    }

    @keyframes dash {
        0% {
            stroke-dasharray: 1, 200;
            stroke-dashoffset: 0;
        }

        50% {
            stroke-dasharray: 89, 200;
            stroke-dashoffset: -35px;
        }

        100% {
            stroke-dasharray: 89, 200;
            stroke-dashoffset: -124px;
        }
    }
</style>

  <link href="assets/iconfont/MaterialIcons-Regular.woff" rel="stylesheet" />            
  <link rel="stylesheet" href="assets/iconfont/material-icons.css" /> 
  <link rel="preload" as="font" href="assets/iconfont/MaterialIcons-Regular.woff" type="font/woff" crossorigin="anonymous" />
</head>
<body class="mat-typography">
  <app-root>
    </app-root>
</body>
</html>
