<div class="container-fluid">
    <div class="d-flex justify-content-between mb-4">
        <div class="flex-row container-fluid">
            <div class="flex-row justify-content-center">
                    <h1 mat-dialog-title>{{title}}</h1>
                    <div mat-dialog-content>
                        <form [formGroup]="form">

                            <div class="form-group">
                                <label for="name">Name</label>
                                <input type="text" class="form-control" formControlName="name" id="Namep" >
                            </div>
                            <div class="form-group">
                                <label for="name">description</label>
                                <input type="text" class="form-control" formControlName="description" id="description" >
                            </div>
                            <div class="form-group">
                                <label for="name">sku</label>
                                <input type="text" class="form-control" formControlName="sku" id="sku" >
                            </div>
                            <div class="form-group">
                                <label for="price">price</label>
                                <input type="number" min="1" class="form-control" formControlName="price" id="price" >
                            </div>
                            <div class="form-group">
                                <label for="quantity">quantity</label>
                                <input type="number" min="0" class="form-control" formControlName="quantity" id="quantity" >
                            </div>

                            <mat-form-field style="display: block;">
                            <mat-label>category</mat-label>
                            <mat-select name="category" formControlName="category">
                              <mat-option *ngFor="let t of catList" [value]="t.id">
                                {{t.name}}
                              </mat-option>
                            </mat-select>
                          </mat-form-field>

                            <div class="form-row">
                                    <div mat-dialog-actions >
                                        <button mat-raised-button color="warn" (click)="closeDialog()">Close
                                        <mat-icon>close</mat-icon>
                                        </button>
                                            <button mat-raised-button color="primary" [disabled]="!form.valid" (click)="addProduct()" >Save
                                            <mat-icon>save</mat-icon>
                                        </button>
                                    </div> 
                            </div>
                        </form>
                    </div>

            </div>
        </div>
    </div>
</div>
